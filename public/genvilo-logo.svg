<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="400" viewBox="0 0 1400 400" role="img" aria-labelledby="title desc">
  <title id="title">Genvilo logo</title>
  <desc id="desc">Horizontal Genvilo logo with a colourful design icon and the tagline Design Made Easy.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="38%" stop-color="#38bdf8"/>
      <stop offset="67%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="swooshGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="34%" stop-color="#fb7185"/>
      <stop offset="68%" stop-color="#d946ef"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="nibGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="45%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="tileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#701a75"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <g transform="translate(40 45)" filter="url(#softShadow)">
    <rect x="0" y="0" width="300" height="300" rx="72" fill="url(#tileGradient)" stroke="#38bdf8" stroke-width="6"/>
    <rect x="12" y="12" width="276" height="276" rx="62" fill="none" stroke="#ec4899" stroke-width="4" opacity="0.65"/>
    <path d="M52 198 C106 110, 216 92, 262 132 C205 129, 142 153, 84 218 Z" fill="url(#swooshGradient)"/>
    <path d="M58 216 C132 170, 210 160, 266 177 C226 195, 160 220, 81 239 Z" fill="#38bdf8" opacity="0.9"/>
    <g transform="translate(141 37) rotate(13)">
      <rect x="28" y="0" width="58" height="150" rx="18" fill="url(#nibGradient)" stroke="#0f172a" stroke-width="6"/>
      <rect x="33" y="38" width="48" height="12" rx="6" fill="#bae6fd" opacity="0.7"/>
      <path d="M18 145 L96 145 L82 222 L57 249 L32 222 Z" fill="#f8fafc" stroke="#0f172a" stroke-width="7"/>
      <path d="M57 168 L57 227" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
      <circle cx="57" cy="168" r="8" fill="#0f172a"/>
    </g>
    <g fill="#fde047">
      <path d="M68 78 l7 16 16 7-16 7-7 16-7-16-16-7 16-7z"/>
      <path d="M252 72 l4 9 9 4-9 4-4 9-4-9-9-4 9-4z"/>
      <path d="M229 234 l4 9 9 4-9 4-4 9-4-9-9-4 9-4z"/>
    </g>
    <g fill="#f472b6">
      <circle cx="247" cy="115" r="6"/>
      <circle cx="78" cy="255" r="5"/>
    </g>
  </g>
  <g transform="translate(390 0)">
    <text x="0" y="220" font-family="Inter, Arial, Helvetica, sans-serif" font-size="178" font-weight="800" letter-spacing="-8" fill="url(#brandGradient)" stroke="#0f172a" stroke-width="3" paint-order="stroke">Genvilo</text>
    <line x1="20" y1="275" x2="120" y2="275" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
    <text x="145" y="294" font-family="Inter, Arial, Helvetica, sans-serif" font-size="58" font-weight="600" letter-spacing="1.5" fill="#ffffff">Design Made Easy</text>
    <line x1="690" y1="275" x2="790" y2="275" stroke="#ec4899" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
